<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>JDAS — Industry Updates</title>
  <link rel="stylesheet" href="/static/style.css?v=3.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <header class="appbar">
    <div class="brand">
      <div class="brand-title">JD Analytics & Solutions</div>
      <div class="brand-sub" id="buildStamp">—</div>
    </div>

    <div class="appbar-actions">
      <div class="pill" title="API status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Ready</span>
      </div>

      <label class="select">
        <span>Rows</span>
        <select id="topSelect">
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="20">20</option>
        </select>
      </label>

      <label class="select">
        <span>View</span>
        <select id="viewSelect">
          <option value="sections" selected>Sections</option>
          <option value="cards">Cards</option>
          <option value="table">Table</option>
          <option value="raw">JSON</option>
        </select>
      </label>

      <button class="btn primary" id="refreshBtn">Refresh</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="sidebar-title">Industries</div>
      <nav id="industryNav" class="nav"></nav>

      <div class="sidebar-divider"></div>

      <div class="sidebar-title">Tables</div>
      <nav id="tableNav" class="nav"></nav>
    </aside>

    <section class="content">
      <div class="content-head">
        <div>
          <div class="h1" id="pageTitle">Industry Updates</div>
          <div class="muted" id="pageSubtitle">—</div>
        </div>

        <div class="search">
          <input id="searchInput" type="search" placeholder="Search title, body, tag, ID..." />
        </div>
      </div>

      <section id="sectionsView"></section>
      <section id="cardsView" style="display:none;"></section>
      <section id="tableView" style="display:none;"></section>

      <section id="debugView" style="display:none;">
        <pre id="rawJson" class="codebox"></pre>
      </section>
    </section>
  </main>

  <script src="/static/app.js?v=3.0"></script>
</body>
</html>
